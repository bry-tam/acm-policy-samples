---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: gen-metallb-sub-namecheck
policyDefaults:
  namespace: bry-tam-policies
  remediationAction: enforce
  consolidateManifests: false
  policySets:
    - metallb-operator

  categories:
    - "CM Configuration Management"
  controls:
    - "CM-2 Baseline Configuration"
  standards:
    - "NIST SP 800-53"

  policyLabels:
    policy_gen.name: metallb-sub-namecheck

  severity: medium

placementBindingDefaults:
  name: "metallb-sub-namecheck-binding"

policies:
  - name: metallb-sub-namecheck
    description: "Removes OLM Subscriptions where metadata.name does not match the package name (spec.name)"
    manifests:
      - path: subscription-name-check.yml
        name: metallb-sub-name-check

  - name: metallb-operator
    description: "Installs MetalLB Operator"
    dependencies:
      - name: "metallb-sub-namecheck"
        compliance: "Compliant"
    manifests:
      - path: operatorpolicy.yml

policySets:
  - name: metallb-operator
    placement:
      placementName: "env-bound-placement"
