---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: gk-policy-generator-maxiamclusterbindings
policyDefaults:
  namespace: bry-tam-policies
  remediationAction: enforce
  consolidateManifests: false
  informGatekeeperPolicies: false
  categories:
    - "AC Access Control"
  controls:
    - "AC-6 Least Privilege"
  standards:
    - "NIST SP 800-53"
  policyLabels:
    policy_gen.name: max-iamclusterbindings
  severity: medium
  policySets:
    - gp-valid-max-iamclusterbindings

placementBindingDefaults:
  name: "gp-valid-max-iamclusterbindings-binding"

policies:
  - name: gp-valid-max-iamclusterbindings
    description: "Deploys a Gatekeeper ConstraintTemplate and Constraint to enforce a maximum number of users bound to a specified ClusterRole across all ClusterRoleBindings"
    remediationAction: enforce
    dependencies:
      - name: "gatekeeper-instance"
        compliance: "Compliant"
    manifests:
      - path: max-iamclusterbindings/constrainttemplate.yml
        name: maxiamclusterbindings-constrainttemplate
      - path: max-iamclusterbindings/maxiamclusterbindings.yml
        name: max-cluster-admins
        # extraDependencies:
        #   - name: maxclusteradmins
        #     apiVersion: templates.gatekeeper.sh/v1beta1
        #     kind: ConstraintTemplate
        #     compliance: "Compliant"

policySets:
  - name: gp-valid-max-iamclusterbindings
    placement:
      placementName: "ft-iam-maxbindings--enabled"
