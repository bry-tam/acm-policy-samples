---
object-templates-raw: |
  {{- $username := "redhat" }}
  {{- $password := "redhat" }}
  {{- $credentials := printf "%s:%s" $username $password | sha256sum }}
  {{- $existingSecret := lookup "v1" "Secret" "openshift-config" "htpasswd-breakglass-secret" }}
  {{- $existingAnnotation := dig "metadata" "annotations" "breakglass-credentials" "" $existingSecret }}
  {{- $existingHtpasswd := dig "data" "htpasswd" "" $existingSecret }}

  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: htpasswd-breakglass-secret
        namespace: openshift-config
        annotations:
          breakglass-credentials: '{{ $credentials }}'
      data:
      {{- if eq $existingAnnotation $credentials }}
        htpasswd: '{{ $existingHtpasswd }}'
      {{- else }}
        htpasswd: '{{ htpasswd $username $password | base64enc }}'
      {{- end }}
