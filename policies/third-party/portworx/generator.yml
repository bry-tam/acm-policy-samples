---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: gen-policy-portworx
policyDefaults:
  namespace: bry-tam-policies
  remediationAction: enforce
  consolidateManifests: false
  policySets:
    - portworx-operator

  categories:
    - "CM Configuration Management"
  controls:
    - "CM-2 Baseline Configuration"
  standards:
    - "NIST SP 800-53"

  policyLabels:
    policy_gen.name: portworx-operator

  severity: medium

placementBindingDefaults:
  name: "portworx-binding"

policies:
  - name: portworx-operator
    description: "Installs Portworx storage operator"
    remediationAction: enforce
    manifests:
      - path: namespace.yml
        name: portworx-namespace

      - path: operatorpolicy.yml
        name: portworx-operator-install

      - path: console-plugin.yml
        name: px-console-plugin

policySets:
  - name: portworx-operator
    placement:
      placementName: "ft-portworx--enabled"
