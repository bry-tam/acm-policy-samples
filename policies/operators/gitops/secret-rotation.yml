---
object-templates-raw: |
  {{- $maxAgeHours := 168.0 }}
  {{- $secret := lookup "v1" "Secret" "openshift-gitops-operator" "openshift-gitops-operator-metrics-monitor-bearer-token" }}

  {{- $creationTS := dig "metadata" "creationTimestamp" "" $secret }}
  {{- $replaceSecret := (and (ne $creationTS "")
                            (gt (now.Sub ($creationTS | toDate "2006-01-02T15:04:05Z07:00")).Hours $maxAgeHours)) }}

  - complianceType: '{{ $replaceSecret | ternary "mustnothave" "musthave" }}'
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: openshift-gitops-operator-metrics-monitor-bearer-token
        namespace: openshift-gitops-operator
        annotations:
          kubernetes.io/service-account.name: openshift-gitops-operator-controller-manager
