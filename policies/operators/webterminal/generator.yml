---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: gen-policy-webterminal
policyDefaults:
  namespace: bry-tam-policies
  remediationAction: enforce
  consolidateManifests: false
  policySets:
    - webterminal-operator

  categories:
    - "CM Configuration Management"
  controls:
    - "CM-2 Baseline Configuration"
  standards:
    - "NIST SP 800-53"

  policyLabels:
    policy_gen.name: webterminal-operator

  severity: medium

placementBindingDefaults:
  name: "webterminal-binding"

policies:
  - name: web-terminal
    description: "Install Web-Terminal Operator"
    remediationAction: enforce
    manifests:
      - path: operatorpolicy.yml
        name: web-terminal-operator-policy

policySets:
  - name: webterminal-operator
    placement:
      placementName: "ft-webterminal--enabled"
