---
apiVersion: ingressnodefirewall.openshift.io/v1alpha1
kind: IngressNodeFirewall
metadata:
  name: block-icmp-timestamp
spec:
  interfaces:
    - eth0 ## likely Azure primary interface
    - ens4 ## likely GCP primary interface
    - ens5 ## likely AWS primary interface
  nodeSelector: {}
  ingress:
    - sourceCIDRs:
        - 0.0.0.0/0
      rules:
        - order: 12
          protocolConfig:
            protocol: ICMP
            icmp:
              icmpType: 13
              icmpCode: 0
          action: Deny
        - order: 13
          protocolConfig:
            protocol: ICMP
            icmp:
              icmpType: 14
              icmpCode: 0
          action: Deny
