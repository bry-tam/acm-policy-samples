---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: gen-policy-metallb
policyDefaults:
  namespace: bry-tam-policies
  remediationAction: enforce
  consolidateManifests: false
  policySets:
    - metallb-operator

  categories:
    - "CM Configuration Management"
  controls:
    - "CM-2 Baseline Configuration"
  standards:
    - "NIST SP 800-53"

  policyLabels:
    policy_gen.name: metallb-operator

  severity: medium

placementBindingDefaults:
  name: "metallb-binding"

policies:
  - name: metallb-operator
    description: "Installs MetalLB Operator"
    manifests:
      - path: namespace.yml
        name: metallb-namespace

      - path: operatorpolicy.yml

policySets:
  - name: metallb-operator
    placement:
      placementName: "ft-metallb--enabled"
