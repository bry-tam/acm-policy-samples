name: Policy-Checks

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Your normal steps go here.
      # Added:
      - name: All files end with newline
        run: find . -path ./.git -prune -false -o -type f -print | xargs -L1 bash -c 'test "$(tail -c1 "$0")" && echo "No newline at end of $0"'
        shell: bash
